services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: dungeon-lord-backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ../data:/app/data
      - ../backend/config.json:/app/backend/config.json
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    container_name: dungeon-lord-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-6666}:80"
    volumes:
      - ../data/images:/usr/share/nginx/images:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
